name: kafka-db-transaction-poc

# Infrastructure for running the app in prod mode (java -jar target/quarkus-app/quarkus-run.jar).
# The app runs on the host and connects to the ports published below, matching the %prod settings
# in src/main/resources/application.properties:
#   kafka.bootstrap.servers = localhost:9092
#   datasource             = jdbc:postgresql://localhost:5432/items  (quarkus / quarkus)
#
#   Kafka UI  -> http://localhost:8085
#   Adminer   -> http://localhost:8086   (System: PostgreSQL, Server: postgres, User/Pass: quarkus, DB: items)

services:
  postgres:
    image: postgres:18
    container_name: kdt-postgres
    environment:
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus
      POSTGRES_DB: items
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (data lives in a versioned subdir).
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarkus -d items"]
      interval: 5s
      timeout: 5s
      retries: 10

  # PostgreSQL UI. Connect with System=PostgreSQL, Server=postgres, User/Pass=quarkus, DB=items.
  adminer:
    image: adminer:5
    container_name: kdt-adminer
    ports:
      - "8086:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.9.0
    container_name: kdt-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two broker listeners: PLAINTEXT for in-cluster clients (kafka-ui), PLAINTEXT_HOST for the
      # app running on the host. They must advertise different host names so each side connects back
      # correctly.
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single broker: every replication factor must be 1. The transaction state log settings are
      # required for transactions; without them initTransactions() (used by BOTH transactional
      # paths) blocks and the app fails to start.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kdt-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
