# =============================================================================
# Shared infrastructure (both approaches)
# =============================================================================
# Database. In dev/test, leaving the JDBC URL unset lets Quarkus DevServices auto-provision
# PostgreSQL (and a transaction-capable Kafka broker) via Docker. Both approaches share the
# single "items" table.
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=update

# Production connection settings. Defaults target the local docker-compose.yml stack (Kafka on
# localhost:9092, PostgreSQL on localhost:5432/items); override via env vars elsewhere. The Kafka
# broker is shared by both approaches; dev/test use DevServices instead of these.
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
%prod.quarkus.datasource.username=${DB_USER:quarkus}
%prod.quarkus.datasource.password=${DB_PASSWORD:quarkus}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/items}

# =============================================================================
# Approach A  ->  POST /items/pooled
# Pool of raw transactional producers (ItemCoordinator + KafkaTransactionalProducerPool).
# One transactional.id per producer so concurrent requests never collide; scales with pool-size.
# =============================================================================
item.pooled.kafka.topic=item-created-pooled
item.pooled.kafka.tx.pool-size=16
item.pooled.kafka.tx.id-prefix=item-pooled-tx
item.pooled.kafka.tx.borrow-timeout=PT5S
item.pooled.kafka.tx.transaction-timeout=PT10S

# Smaller pool keeps test startup fast (fewer initTransactions round-trips).
%test.item.pooled.kafka.tx.pool-size=4

# =============================================================================
# Approach B  ->  POST /items/chained
# SmallRye KafkaTransactions emitter + @Transactional (ItemTxCoordinator). A single producer
# (one transaction at a time), serialized by @Bulkhead(1). transactional.id enables transactions.
# =============================================================================
mp.messaging.outgoing.items-tx.connector=smallrye-kafka
mp.messaging.outgoing.items-tx.topic=item-created-chained
mp.messaging.outgoing.items-tx.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.items-tx.acks=all
mp.messaging.outgoing.items-tx.transactional.id=item-chained-tx
