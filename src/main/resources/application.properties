# Topic + transactional producer pool: one transactional.id per producer so concurrent
# requests open their DB+Kafka transactions without colliding. pool-size == max concurrent
# transactions.
item.kafka.topic=item-created
item.kafka.tx.pool-size=16
item.kafka.tx.id-prefix=item-tx
item.kafka.tx.borrow-timeout=PT5S
item.kafka.tx.transaction-timeout=PT10S

# Smaller pool keeps test startup fast (fewer initTransactions round-trips).
%test.item.kafka.tx.pool-size=4

# Outgoing channel for the KafkaTransactions path (POST /items/chained). A transactional.id
# enables transactions on this single-producer emitter; @Bulkhead(1) serializes access to it.
mp.messaging.outgoing.items-tx.connector=smallrye-kafka
mp.messaging.outgoing.items-tx.topic=item-created
mp.messaging.outgoing.items-tx.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.items-tx.acks=all
mp.messaging.outgoing.items-tx.enable.idempotence=true
mp.messaging.outgoing.items-tx.transactional.id=items-tx-producer

# Database kind only: in dev/test, leaving the URL unset lets Quarkus DevServices auto-provision
# PostgreSQL (and a transaction-capable Kafka broker for the producer pool) via Docker.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=40
quarkus.hibernate-orm.schema-management.strategy=update

# Production connection settings (dev/test use DevServices instead of these).
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
%prod.quarkus.datasource.username=${DB_USER:quarkus}
%prod.quarkus.datasource.password=${DB_PASSWORD:quarkus}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/items}
